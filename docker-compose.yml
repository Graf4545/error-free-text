name: error-free-text

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: error_free_text
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d error_free_text"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/error_free_text
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SCHEDULER_FIXED_DELAY: 5000
    depends_on:
      postgres:
        condition: service_healthy
