spring:
  application:
    name: error-free-text
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/error_free_text}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

yandex:
  speller:
    base-url: https://speller.yandex.net/services/spellservice.json
    connect-timeout: ${SPELLER_CONNECT_TIMEOUT:5s}
    read-timeout: ${SPELLER_READ_TIMEOUT:30s}

app:
  scheduler:
    fixed-delay: ${SCHEDULER_FIXED_DELAY:5000}
    batch-size: ${SCHEDULER_BATCH_SIZE:10}

logging:
  level:
    com.errorfreetext: INFO
    org.springframework.web: INFO
